services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: uv run uvicorn quantvol.api.main:app --host 0.0.0.0 --port 8000 --app-dir src

  streamlit:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/forecast
    command: uv run streamlit run src/quantvol/app/streamlit_app.py --server.address 0.0.0.0